app:
  name: RTIE
  version: "1.0.0"
  environment: dev

oracle:
  pool_min: 2
  pool_max: 6
  query_timeout: 120
  explain_plan_cost_threshold: 500
  schema: OFSMDM

redis:
  ttl_metadata: 86400
  ttl_logic: null
  key_prefix: "rtie"

llm:
  temperature: 0
  max_tokens: 4000
  confidence_threshold: 0.85

graph:
  node_timeout: 60
  max_retries: 3
  functions_dirs:
    - "db/modules/OFSDMINFO_ABL_DATA_PREPARATION/functions"
  force_reparse_on_startup: false
  fallback_to_raw_on_low_confidence: true
  max_payload_chars: 2000
  token_estimate_chars_per_token: 4

embedding:
  model: "text-embedding-3-small"
  dimensions: 1536
  description_provider: "openai"
  description_model: "gpt-4o"
  search_top_k: 3
  auto_index_modules:
    # Phase 3: extend coverage to OFSERM. Pre-Phase-3 only the OFSMDM
    # module was indexed, so semantic search never surfaced OFSERM
    # candidates. The startup indexer now also iterates every schema in
    # graph:<schema>:* keys (see IndexerAgent.index_all_loaded), so this
    # list is informational once the keys are populated; entries here
    # remain authoritative for the legacy /index-module admin path.
    - "OFSDMINFO_ABL_DATA_PREPARATION"
    - "ABL_CAR_CSTM_V4"

langsmith:
  project: RTIE
  tracing: true

phase2:
  enabled: true
  max_rows_per_node: 100
  verification_tolerance: 0.01
  oracle_query_timeout_seconds: 10
  require_mis_date: true

data_query:
  enabled: true
  hard_row_limit: 10000    # reject row-list queries above this count
  warn_row_limit: 100      # ask for confirmation between warn and hard
  display_row_limit: 100   # FETCH FIRST N ROWS ONLY applied at execute time

# W35 Phase 5: business identifier literal index. Each entry compiles to a
# regex applied to function source bodies during graph build. Matches are
# persisted at graph:literal:<schema>:<identifier> so Phase 7 routing can
# resolve a query naming a domain identifier (e.g. "How is CAP973
# calculated?") directly to every function that mentions it. The default
# `cap_codes` pattern matches Basel capital standard account head IDs
# (CAP\d{3}). Add new entries here to index additional families
# (GL account codes, risk type codes, etc.) without code changes.
business_identifier_patterns:
  cap_codes:
    regex: 'CAP\d{3}'
    description: 'Basel capital standard account head IDs'
