<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- R-TIE brand mark — static lineage-graph glyph (no animation in
       favicons). Colored in the signature gold so it reads as the brand
       on both light and dark browser chrome. -->
  <g stroke="#c89c4a" stroke-linecap="round" fill="none">
    <path d="M11 11 C 18 14, 22 18, 28 20" stroke-opacity="0.85" stroke-width="2" />
    <path d="M11 11 C 11 18, 12 24, 14 30" stroke-opacity="0.7"  stroke-width="1.8" />
    <path d="M28 20 C 30 24, 30 27, 28 30" stroke-opacity="0.7"  stroke-width="1.8" />
    <path d="M28 20 C 24 24, 22 27, 21 30" stroke-opacity="0.55" stroke-width="1.5" />
    <path d="M26 19.4 L28 20 L26.6 21.6"   stroke-opacity="0.95" stroke-width="1.8" stroke-linejoin="round" />
  </g>
  <!-- nodes: root, mid hub, three leaves -->
  <g fill="#c89c4a">
    <circle cx="11" cy="11" r="4.2" />
    <circle cx="28" cy="20" r="3.4" />
    <circle cx="14" cy="30" r="2.6" />
    <circle cx="21" cy="30" r="2.2" />
    <circle cx="28" cy="30" r="2.6" />
  </g>
</svg>
